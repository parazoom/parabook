name: parabook
description: "Logbook pour parachutistes - ParaBook"
publish_to: 'none'

version: 1.2.0+5

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3
  sqflite_common_ffi_web: ^1.0.0
  web: ^1.1.0
  path: ^1.9.0
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  intl: ^0.20.2
  csv: ^6.0.0
  share_plus: ^10.0.0
  file_picker: ^8.0.0

  path_provider: ^2.1.3
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  generate: true
